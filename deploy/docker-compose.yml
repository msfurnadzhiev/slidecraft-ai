version: "3.9"

services:

  api:
    container_name: slidecraft-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - embeddings
    env_file:
      - ../.env
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/slidecraft
      IMAGE_STORAGE_PATH: /data/images
      EMBEDDINGS_API_URL: http://embeddings:80/v1
    volumes:
      - images:/data/images

  db:
    container_name: slidecraft-db
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slidecraft
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  embeddings:
    container_name: slidecraft-embeddings
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    ports:
      - "8080:80"
    command:
      - --model-id
      - BAAI/bge-small-en-v1.5
    environment:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    volumes:
      - hf_cache:/data

volumes:
  pgdata:
  images:
  hf_cache: